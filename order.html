<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Cake - Modi's Bakers</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- 🔝 Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Modi's Bakers</a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
                <li class="nav-item"><a class="nav-link active" href="#">Order</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<main>
    <!-- 🎂 Order Form -->
    <section class="container my-5">
        <h2 class="text-center mb-4">Customize Your Cake 🎂</h2>

        <form id="orderForm" class="shadow p-4 bg-light rounded">

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="tel" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Select Flavor</label>
                <select class="form-select">
                    <option>Chocolate</option>
                    <option>Butterscotch</option>
                    <option>Pineapple</option>
                    <option>Fruit</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Cake Size</label>
                <select class="form-select">
                    <option>500g</option>
                    <option>1 Kg</option>
                    <option>2 Kg</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Message on Cake</label>
                <input type="text" class="form-control" placeholder="e.g. Happy Birthday Rahul">
            </div>

            <div class="mb-3">
                <label class="form-label">Delivery Date</label>
                <input type="date" class="form-control">
            </div>

            <button type="submit" class="btn btn-primary w-100">Submit Order</button>

        </form>
    </section>
</main>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3">
    <p>© 2026 Modi's Bakers</p>
</footer>

<!-- JS -->
<script src="js/script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<script>
AOS.init();
</script>

</body>
</html>
